<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule</title>
    <link rel="stylesheet" href="style/styles.css">
</head>
<body data-auth-required="true">

    <nav>
        <a href="index.html">Home</a>
        <a href="activity.html">Activity Planner</a>
        <a href="schedule.html">Schedule Activities</a>
        <a href="userNotes.html">Notes</a>
        <a href="profile.html" id="nav-profile-link" style="display: none;">Profile</a>
        <a href="auth.html" id="nav-auth-link">Log In</a>
    </nav>

    <main>

        <h1>Schedule an Activity</h1>

        <form id="schedule-form">
            <label for="activity-input">Activity:</label>
            <input type="text" id="activity-input" placeholder="Enter an activity" required>

            <label for="date-input">Date:</label>
            <input type="date" id="date-input" required>

            <button type="submit">Add to Calendar</button>
        </form>

        <div id="calendar-section">
            <div id="calendar-header">
                <h2 id="month-label"></h2>
                <button id="prev-month">&#8592;</button>
                <button id="next-month">&#8594;</button>
            </div>

            <table id="calendar-table">
                <thead>
                    <tr>
                        <th>Sun</th>
                        <th>Mon</th>
                        <th>Tue</th>
                        <th>Wed</th>
                        <th>Thu</th>
                        <th>Fri</th>
                        <th>Sat</th>
                    </tr>
                </thead>
                <tbody id="calendar-body"></tbody>
            </table>
        </div>

    </main>

    <script type="module" src="scripts/schedule.js"></script>
    <script type="module" src="scripts/auth-guard.js"></script>

</body>
</html>
