<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="style/styles.css">
</head>
<body data-auth-required="true">

    <nav>
        <a href="index.html">Home</a>
        <a href="activity.html">Activity Planner</a>
        <a href="schedule.html">Schedule Activities</a>
        <a href="userNotes.html">Notes</a>
        <a href="profile.html" id="nav-profile-link" style="display: none;">Profile</a>
        <a href="auth.html" id="nav-auth-link">Log In</a>
    </nav>

    <main>

        <h1>Your Profile</h1>

        <form id="profile-form">
            <label for="profile-username">Username:</label>
            <input type="text" id="profile-username" placeholder="Choose a username" required>

            <label for="profile-email">Email:</label>
            <input type="email" id="profile-email" required>

            <button type="submit">Save Changes</button>
        </form>

        <p id="profile-success" style="display: none; color: green;">Changes saved.</p>
        <p id="profile-error" class="auth-error"></p>

    </main>

    <script type="module" src="scripts/profile.js"></script>
    <script type="module" src="scripts/auth-guard.js"></script>

</body>
</html>
