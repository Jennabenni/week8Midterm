<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In / Sign Up</title>
    <link rel="stylesheet" href="style/styles.css">
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="activity.html">Activity Planner</a>
        <a href="schedule.html">Schedule Activities</a>
        <a href="userNotes.html">Notes</a>
        <a href="profile.html" id="nav-profile-link" style="display: none;">Profile</a>
    </nav>

    <main>

        <div id="auth-container">

            <div id="login-form-section">
                <h1>Log In</h1>
                <form id="login-form">
                    <label for="login-email">Email:</label>
                    <input type="email" id="login-email" required>

                    <label for="login-password">Password:</label>
                    <input type="password" id="login-password" required>

                    <button type="submit">Log In</button>
                </form>
                <p>Don't have an account? <a href="#" id="show-signup">Sign up here</a></p>
                <p id="login-error" class="auth-error"></p>
            </div>

            <div id="signup-form-section" style="display: none;">
                <h1>Sign Up</h1>
                <form id="signup-form">
                    <label for="signup-email">Email:</label>
                    <input type="email" id="signup-email" required>

                    <label for="signup-password">Password:</label>
                    <input type="password" id="signup-password" required>

                    <button type="submit">Create Account</button>
                </form>
                <p>Already have an account? <a href="#" id="show-login">Log in here</a></p>
                <p id="signup-error" class="auth-error"></p>
            </div>

        </div>

    </main>

    <script type="module" src="scripts/auth.js"></script>

</body>
</html>
