<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <link rel="stylesheet" href="style/styles.css">
</head>
<body data-auth-required="true">

    <nav>
        <a href="index.html">Home</a>
        <a href="activity.html">Activity Planner</a>
        <a href="schedule.html">Schedule Activities</a>
        <a href="userNotes.html">Notes</a>
        <a href="profile.html" id="nav-profile-link" style="display: none;">Profile</a>
        <a href="auth.html" id="nav-auth-link">Log In</a>
    </nav>

    <main>

        <h1>My Notes</h1>

        <form id="note-form">
            <label for="note-title">Title:</label>
            <input type="text" id="note-title" placeholder="e.g. Hiking trip notes" required>

            <label for="note-body">Note:</label>
            <textarea id="note-body" placeholder="Write your note here..." required></textarea>

            <button type="submit">Save Note</button>
        </form>

        <section id="notes-list"></section>

    </main>

    <script type="module" src="scripts/notes.js"></script>
    <script type="module" src="scripts/auth-guard.js"></script>

</body>
</html>
