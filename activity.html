<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity</title>
    <link rel="stylesheet" href="style/styles.css">
</head>
<body data-auth-required="true">

    <nav>
        <a href="index.html">Home</a>
        <a href="activity.html">Activity Planner</a>
        <a href="schedule.html">Schedule Activities</a>
        <a href="userNotes.html">Notes</a>
        <a href="profile.html" id="nav-profile-link" style="display: none;">Profile</a>
        <a href="auth.html" id="nav-auth-link">Log In</a>
    </nav>

    <main>

        <div id="quiz-container">
            <p id="question-counter"></p>
            <p id="question-text"></p>
            <div id="options-container"></div>
            <button id="next-btn" disabled>Next</button>
        </div>

        <div id="result-container" style="display: none;">
            <h2 id="result-title"></h2>
            <p id="result-description"></p>
            <ul id="result-list"></ul>
            <div id="result-custom-activities"></div>
            <button id="restart-btn">Take the Quiz Again</button>
        </div>

    </main>

    <hr>

    <section id="food-generator">
        <h2>Food &amp; Drink Generator</h2>
        <p>Answer two questions and get a suggestion.</p>

        <div id="food-questions">
            <p>
                <strong>1. Hot or cold?</strong><br>
                <label><input type="radio" name="temp" value="Hot"> Hot</label><br>
                <label><input type="radio" name="temp" value="Cold"> Cold</label>
            </p>

            <p>
                <strong>2. Food or drink?</strong><br>
                <label><input type="radio" name="type" value="Food"> Food</label><br>
                <label><input type="radio" name="type" value="Drink"> Drink</label>
            </p>
        </div>

        <button id="generate-food-btn" disabled>Generate</button>

        <div id="food-result" style="display: none;">
            <p id="food-suggestion"></p>
        </div>
    </section>

    <hr>

    <section id="custom-activity-section">
        <h2>Create Your Own Activity</h2>

        <form id="custom-activity-form">
            <label for="custom-activity-name">Activity Name:</label>
            <input type="text" id="custom-activity-name" placeholder="e.g. Pottery class" required>

            <fieldset>
                <legend>Category:</legend>
                <label><input type="radio" name="activity-cat" value="Solo Laid-Back" required> Solo Laid-Back</label><br>
                <label><input type="radio" name="activity-cat" value="Solo High-Intensity"> Solo High-Intensity</label><br>
                <label><input type="radio" name="activity-cat" value="Group Laid-Back"> Group Laid-Back</label><br>
                <label><input type="radio" name="activity-cat" value="Group High-Intensity"> Group High-Intensity</label>
            </fieldset>

            <label>Checklist Items:</label>
            <div id="checklist-builder">
                <input type="text" id="checklist-item-input" placeholder="e.g. Bring water bottle">
                <button type="button" id="add-item-btn">Add Item</button>
                <ul id="checklist-preview"></ul>
            </div>

            <button type="submit">Save Activity</button>
        </form>

        <div id="custom-activities-list"></div>
    </section>

    <script src="scripts/activity.js"></script>
    <script src="scripts/food.js"></script>
    <script type="module" src="scripts/customActivity.js"></script>
    <script type="module" src="scripts/auth-guard.js"></script>

</body>
</html>
