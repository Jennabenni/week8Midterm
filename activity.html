<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity</title>
    <link rel="stylesheet" href="style/styles.css">
</head>
<body data-auth-required="true">

    <nav>
        <a href="index.html">Home</a>
        <a href="activity.html">Activity Planner</a>
        <a href="schedule.html">Schedule Activities</a>
        <a href="userNotes.html">Notes</a>
        <a href="profile.html" id="nav-profile-link" style="display: none;">Profile</a>
        <a href="auth.html" id="nav-auth-link">Log In</a>
    </nav>

    <main>

        <div id="quiz-container">
            <p id="question-counter"></p>
            <p id="question-text"></p>
            <div id="options-container"></div>
            <button id="next-btn" disabled>Next</button>
        </div>

        <div id="result-container" style="display: none;">
            <h2 id="result-title"></h2>
            <p id="result-description"></p>
            <ul id="result-list"></ul>
            <button id="restart-btn">Take the Quiz Again</button>
        </div>

    </main>

    <hr>

    <section id="food-generator">
        <h2>Food &amp; Drink Generator</h2>
        <p>Answer two questions and get a suggestion.</p>

        <div id="food-questions">
            <p>
                <strong>1. Hot or cold?</strong><br>
                <label><input type="radio" name="temp" value="Hot"> Hot</label><br>
                <label><input type="radio" name="temp" value="Cold"> Cold</label>
            </p>

            <p>
                <strong>2. Food or drink?</strong><br>
                <label><input type="radio" name="type" value="Food"> Food</label><br>
                <label><input type="radio" name="type" value="Drink"> Drink</label>
            </p>
        </div>

        <button id="generate-food-btn" disabled>Generate</button>

        <div id="food-result" style="display: none;">
            <p id="food-suggestion"></p>
            <button id="next-food-btn">Next Suggestion</button>
        </div>
    </section>

    <script src="scripts/activity.js"></script>
    <script src="scripts/food.js"></script>
    <script type="module" src="scripts/auth-guard.js"></script>

</body>
</html>
